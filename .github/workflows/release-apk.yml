# ============================================================
# Apex AI Agent · APK 构建与发布流水线
# ------------------------------------------------------------
# 触发条件：
#   1. 推送 v* 格式的 tag（如 v1.0.0）→ 自动构建 + 发布 Release
#   2. 手动触发（workflow_dispatch）→ 可选构建 debug/release
#
# 产物：9 个 APK（主 App + 8 个套件 APK）
#   - app-debug.apk          (Main App)
#   - engine-debug.apk       (Engine)
#   - rage-debug.apk         (Rage Mode)
#   - multi-agent-debug.apk  (Multi-Agent)
#   - workflow-debug.apk     (Workflow)
#   - market-debug.apk       (Market)
#   - terminal-debug.apk     (Terminal)
#   - working-files-debug.apk (Working Files)
#   - voice-debug.apk        (Voice)
#
# 必需的 GitHub Secrets（release 签名）：
#   SIGNING_KEYSTORE     - base64 编码的 .jks/.keystore 文件
#   SIGNING_STORE_PASSWORD - keystore 密码
#   SIGNING_KEY_ALIAS    - key alias
#   SIGNING_KEY_PASSWORD - key 密码
#
# 未配置签名时自动降级为 debug 签名（仅用于测试）
# ============================================================
name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
          - both

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.caching=true -Dorg.gradle.parallel=true -Xmx4g'

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 📦 Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-35
            build-tools;34.0.0
            cmake;3.22.1
            ndk;26.3.11579264

      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 🔑 Decode signing keystore
        if: ${{ secrets.SIGNING_KEYSTORE != '' }}
        run: |
          mkdir -p $HOME/keystore
          echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 -d > $HOME/keystore/apex-release.jks
          echo "✅ Keystore decoded: $(ls -la $HOME/keystore/apex-release.jks)"
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}

      - name: 📝 Create local.properties
        run: |
          cat > local.properties << 'PROPS'
          sdk.dir=${ANDROID_HOME}
          PROPS
          # 签名配置（如果 secret 存在）
          if [ -f "$HOME/keystore/apex-release.jks" ]; then
            cat >> local.properties << PROPS
          RELEASE_STORE_FILE=$HOME/keystore/apex-release.jks
          RELEASE_STORE_PASSWORD=${{ secrets.SIGNING_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.SIGNING_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.SIGNING_KEY_PASSWORD }}
          PROPS
            echo "✅ Release signing configured"
          else
            echo "⚠️ No signing keystore found, building with debug signing"
          fi
          # 同时设置环境变量（供 convention plugin 读取）
          echo "APEX_RELEASE_STORE_FILE=$HOME/keystore/apex-release.jks" >> $GITHUB_ENV
          echo "APEX_RELEASE_STORE_PASSWORD=${{ secrets.SIGNING_STORE_PASSWORD }}" >> $GITHUB_ENV
          echo "APEX_KEY_ALIAS=${{ secrets.SIGNING_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "APEX_KEY_PASSWORD=${{ secrets.SIGNING_KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: 🔨 Make gradlew executable
        run: chmod +x ./gradlew

      - name: 📊 Determine build type
        id: buildtype
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # tag push → release
            echo "build_type=release" >> $GITHUB_OUTPUT
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "build_type=${{ github.event.inputs.build_type }}" >> $GITHUB_OUTPUT
            echo "tag_name=dev-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          fi

      - name: 🏗️ Build Release APKs
        if: steps.buildtype.outputs.build_type == 'release' || steps.buildtype.outputs.build_type == 'both'
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: 🏗️ Build Debug APKs
        if: steps.buildtype.outputs.build_type == 'debug' || steps.buildtype.outputs.build_type == 'both'
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 📂 Collect APKs
        id: collect
        run: |
          mkdir -p artifacts
          BUILD_TYPE="${{ steps.buildtype.outputs.build_type }}"
          if [ "$BUILD_TYPE" = "both" ]; then
            TYPES="release debug"
          else
            TYPES="$BUILD_TYPE"
          fi

          echo "### 📱 Built APKs" > apk-list.md
          echo "" >> apk-list.md
          echo "| APK | 模块 | 大小 | 类型 |" >> apk-list.md
          echo "|-----|------|------|------|" >> apk-list.md

          COUNT=0
          for TYPE in $TYPES; do
            find . -path "*/build/outputs/apk/${TYPE}/*.apk" -not -path "*/.git/*" | sort | while read apk; do
              # 获取模块名
              MODULE=$(echo "$apk" | sed "s|^\./||; s|/build/outputs/apk/${TYPE}/.*||")
              # 重命名：模块名-类型.apk
              BASENAME=$(basename "$apk" .apk)
              # 如果是默认的 app-release.apk 或 app-debug.apk，重命名为 main-app
              if echo "$BASENAME" | grep -q "^app-"; then
                OUT_NAME="main-app-${TYPE}.apk"
              else
                OUT_NAME="${BASENAME}.apk"
              fi
              cp "$apk" "artifacts/$OUT_NAME"
              SIZE=$(du -h "artifacts/$OUT_NAME" | cut -f1)
              echo "| \`$OUT_NAME\` | $MODULE | $SIZE | $TYPE |" >> apk-list.md
              COUNT=$((COUNT + 1))
            done
          done

          echo "apk_count=$COUNT" >> $GITHUB_OUTPUT
          echo "✅ Collected APKs:"
          ls -lh artifacts/

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apex-apks-${{ steps.buildtype.outputs.tag_name }}
          path: artifacts/*.apk
          retention-days: 30

      - name: 🚀 Create GitHub Release
        if: github.event_name == 'push' || github.event.inputs.build_type != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.buildtype.outputs.tag_name }}
          name: "Apex AI Agent ${{ steps.buildtype.outputs.tag_name }}"
          body_path: apk-list.md
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
          files: artifacts/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🧹 Cleanup keystore
        if: always()
        run: rm -rf $HOME/keystore
