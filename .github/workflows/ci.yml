# ============================================================
# Apex AI Agent · CI 主流水线 v4.0
# ------------------------------------------------------------
# 触发：push 到 main/develop 分支，或任意 PR
# 任务：编译检查（含 C++ NDK）+ 单元测试 + lint + Web 构建
# 设计：fail-fast，任何步骤失败即阻止合并
# ============================================================
name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.caching=true -Dorg.gradle.parallel=true -Xmx4g'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1: 编译检查 — Kotlin + Hilt + C++ NDK 全量编译
  # ============================================================
  compile:
    name: Compile Check (Kotlin + C++ NDK)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components (NDK + CMake)
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;34.0.0" \
            "cmake;3.22.1" \
            "ndk;26.3.11579264" > /dev/null 2>&1 || true
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: gradle-compile-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-compile-${{ runner.os }}-

      - name: Cache NDK build outputs
        uses: actions/cache@v4
        with:
          path: |
            **/.cxx
            **/build/intermediates/cxx
          key: ndk-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cpp', '**/*.h') }}
          restore-keys: |
            ndk-${{ runner.os }}-

      - name: Create local.properties
        run: echo "sdk.dir=${ANDROID_HOME}" > local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Compile all modules (Kotlin + Hilt KSP)
        run: ./gradlew compileDebugKotlin kspDebugKotlin --no-daemon --continue 2>&1

      - name: Build C++ native libraries (rage-native + ai-terminal)
        run: ./gradlew :rage-native:externalNativeBuildDebug :ai-terminal:externalNativeBuildDebug --no-daemon --continue 2>&1

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compile-reports
          path: |
            **/build/reports/
            **/build/outputs/logs/
            **/.cxx/
          retention-days: 7

  # ============================================================
  # Job 2: APK 组装 — 完整打包验证（含 C++ .so 合并）
  # ============================================================
  assemble:
    name: Assemble Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: compile
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;34.0.0" \
            "cmake;3.22.1" \
            "ndk;26.3.11579264" > /dev/null 2>&1 || true
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: gradle-assemble-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-assemble-${{ runner.os }}-

      - name: Cache NDK build outputs
        uses: actions/cache@v4
        with:
          path: |
            **/.cxx
            **/build/intermediates/cxx
          key: ndk-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cpp', '**/*.h') }}
          restore-keys: |
            ndk-${{ runner.os }}-

      - name: Create local.properties
        run: echo "sdk.dir=${ANDROID_HOME}" > local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: assemble-reports
          path: |
            **/build/reports/
            **/build/outputs/logs/
          retention-days: 7

  # ============================================================
  # Job 3: 单元测试
  # ============================================================
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: compile
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;34.0.0" \
            "cmake;3.22.1" \
            "ndk;26.3.11579264" > /dev/null 2>&1 || true
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: gradle-test-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-test-${{ runner.os }}-

      - name: Create local.properties
        run: echo "sdk.dir=${ANDROID_HOME}" > local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --continue 2>&1

      - name: Generate test report
        if: always()
        run: |
          echo "## Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          PASSED=$(find . -path "*/build/test-results/testDebugUnitTest/*.xml" -exec grep -h 'testsuite ' {} \; | grep -o 'tests="[0-9]*"' | grep -o '[0-9]*' | awk '{s+=$1} END{print s}')
          FAILED=$(find . -path "*/build/test-results/testDebugUnitTest/*.xml" -exec grep -h 'testsuite ' {} \; | grep -o 'failures="[0-9]*"' | grep -o '[0-9]*' | awk '{s+=$1} END{print s}')
          ERRORS=$(find . -path "*/build/test-results/testDebugUnitTest/*.xml" -exec grep -h 'testsuite ' {} \; | grep -o 'errors="[0-9]*"' | grep -o '[0-9]*' | awk '{s+=$1} END{print s}')
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | ${PASSED:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | ${FAILED:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| Errors | ${ERRORS:-0} |" >> $GITHUB_STEP_SUMMARY

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 14

  # ============================================================
  # Job 4: Web 构建 — Next.js tsc + lint
  # ============================================================
  web-build:
    name: Web Build (Next.js tsc + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules
            ~/.bun/install/cache
          key: web-${{ runner.os }}-${{ hashFiles('web/package.json', 'web/bun.lock') }}
          restore-keys: |
            web-${{ runner.os }}-

      - name: Install web dependencies
        run: cd web && bun install --frozen-lockfile

      - name: TypeScript type check
        run: cd web && bunx tsc --noEmit

      - name: ESLint
        run: cd web && bun run lint

      - name: Summary
        if: always()
        run: |
          echo "## Web Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- TypeScript: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- ESLint: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
